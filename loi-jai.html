<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลอยใจ — ที่ระบายอย่างไม่ระบุตัวตน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap');

  :root{
    --ink:#0A0D16;
    --ink-deep:#05060A;
    --river:#131A2B;
    --river-light:#1C2540;
    --candle:#E8B25D;
    --candle-glow:#F6D896;
    --ember:#D98C77;
    --paper:#F2EBDD;
    --mist:#8993AC;
    --mist-dim:#565F78;
    --border:rgba(232,178,93,0.16);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,178,93,0.07), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(217,140,119,0.05), transparent),
      var(--ink);
    color:var(--paper);
    font-family:'Sarabun',sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }

  /* ambient drifting lights */
  .bg-lights{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .light-dot{
    position:absolute;
    width:5px;height:5px;
    border-radius:50%;
    background:var(--candle-glow);
    box-shadow:0 0 10px 3px rgba(246,216,150,0.45);
    opacity:0;
    animation:drift 14s ease-in-out infinite;
  }
  @keyframes drift{
    0%{opacity:0;transform:translateY(0) translateX(0);}
    15%{opacity:0.55;}
    50%{opacity:0.35;transform:translateY(-40px) translateX(8px);}
    85%{opacity:0.5;}
    100%{opacity:0;transform:translateY(-90px) translateX(-6px);}
  }
  @media (prefers-reduced-motion:reduce){
    .light-dot{animation:none;opacity:0.25;}
  }

  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:56px 20px 80px;}

  .hero{text-align:center;margin-bottom:40px;}
  .eyebrow{
    font-size:13px;letter-spacing:0.12em;color:var(--mist);
    margin:0 0 14px;text-transform:none;
  }
  .hero h1{
    font-family:'Noto Serif Thai',serif;
    font-weight:700;
    font-size:clamp(36px,8vw,52px);
    margin:0 0 14px;
    background:linear-gradient(180deg, var(--paper) 0%, var(--candle-glow) 120%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero p.subtitle{
    color:var(--mist);font-size:15.5px;line-height:1.7;max-width:420px;margin:0 auto;
  }

  /* composer */
  .composer{
    background:var(--river);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px 18px 14px;
    margin-bottom:48px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);
  }
  .composer textarea{
    width:100%;min-height:84px;resize:none;
    background:transparent;border:none;outline:none;
    color:var(--paper);font-family:'Sarabun',sans-serif;
    font-size:15.5px;line-height:1.7;
    padding:4px 2px;
  }
  .composer textarea::placeholder{color:var(--mist-dim);}
  .composer-footer{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:8px;padding-top:10px;border-top:1px solid var(--border);
  }
  #char-count{font-size:12.5px;color:var(--mist-dim);}
  #char-count.near-limit{color:var(--ember);}
  #post-btn{
    background:var(--candle);color:var(--ink-deep);
    border:none;border-radius:999px;
    font-family:'Sarabun',sans-serif;font-weight:600;font-size:14.5px;
    padding:9px 20px;cursor:pointer;
    transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    box-shadow:0 6px 18px -6px rgba(232,178,93,0.55);
  }
  #post-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 22px -6px rgba(232,178,93,0.7);}
  #post-btn:disabled{opacity:0.45;cursor:not-allowed;box-shadow:none;}

  /* feed */
  .feed{display:flex;flex-direction:column;gap:16px;}
  .feed-state{
    text-align:center;color:var(--mist-dim);font-size:14px;padding:40px 0;line-height:1.8;
  }
  .feed-state button{
    margin-top:10px;background:var(--river-light);color:var(--paper);
    border:1px solid var(--border);border-radius:999px;padding:7px 16px;
    font-family:'Sarabun',sans-serif;font-size:13.5px;cursor:pointer;
  }

  .post-card{
    background:var(--river);
    border:1px solid var(--border);
    border-radius:4px 22px 4px 22px;
    padding:18px 20px;
    animation:riseIn 0.6s ease both;
  }
  @keyframes riseIn{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  .post-top{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
  }
  .candle-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;border:1px solid var(--border);
    border-radius:999px;padding:5px 12px;cursor:pointer;
    color:var(--candle);font-family:'Sarabun',sans-serif;font-size:13px;
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .candle-btn:hover:not(:disabled){background:rgba(232,178,93,0.1);}
  .candle-btn:active:not(:disabled){transform:scale(0.96);}
  .candle-btn.lit{background:rgba(232,178,93,0.16);cursor:default;}
  .candle-btn:disabled{opacity:0.85;}
  .candle-flame{font-size:14px;}
  .post-time{color:var(--mist-dim);font-size:12.5px;}

  .post-text{
    font-size:15.5px;line-height:1.8;color:var(--paper);
    white-space:pre-wrap;word-break:break-word;margin:0 0 14px;
  }

  .post-footer{display:flex;align-items:center;gap:10px;}
  .comment-toggle{
    background:none;border:none;color:var(--ember);
    font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;
    padding:4px 0;
  }
  .comment-toggle:hover{text-decoration:underline;}

  .comments{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none;}
  .comments.open{display:block;}
  .comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .comment-item{
    background:var(--ink);border-radius:10px;padding:8px 12px;
    font-size:13.5px;line-height:1.6;color:var(--mist);
  }
  .comment-item .ts{display:block;color:var(--mist-dim);font-size:11px;margin-top:3px;}
  .comment-form{display:flex;gap:8px;}
  .comment-form input{
    flex:1;background:var(--ink);border:1px solid var(--border);
    border-radius:999px;padding:8px 14px;color:var(--paper);
    font-family:'Sarabun',sans-serif;font-size:13.5px;outline:none;
  }
  .comment-form input::placeholder{color:var(--mist-dim);}
  .comment-form button{
    background:var(--river-light);color:var(--paper);
    border:1px solid var(--border);border-radius:999px;
    padding:8px 16px;font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;
  }
  .comment-form button:hover{background:#243155;}

  .footer-note{
    text-align:center;color:var(--mist-dim);font-size:12.5px;
    margin-top:48px;line-height:1.8;
  }

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--river-light);color:var(--paper);
    border:1px solid var(--border);border-radius:999px;
    padding:10px 20px;font-size:13.5px;
    opacity:0;transition:opacity 0.25s ease, transform 0.25s ease;
    pointer-events:none;z-index:10;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:480px){
    .wrap{padding:40px 14px 60px;}
    .post-top{flex-wrap:wrap;gap:6px;}
  }
</style>
</head>
<body>

<div class="bg-lights" aria-hidden="true" id="bg-lights"></div>

<div class="wrap">
  <header class="hero">
    <p class="eyebrow">ที่ด่าไอคิวแบบไม่ระบุตัวตน</p>
    <h1>ลอยใจ</h1>
    <p class="subtitle">เขียนสิ่งที่อยู่ในใจตอนนี้ แล้วปล่อยมันใส่ไอคิว<br>ไม่มีใครรู้ว่าเป็นคุณ</p>
  </header>

  <main>
    <section class="composer">
      <textarea id="composer-input" maxlength="1000" placeholder="วันนี้จะด่าอะไรบ้าง... ด่ามาเลยไอคิวอยากฟังแล้ว!!"></textarea>
      <div class="composer-footer">
        <span id="char-count">0/1000</span>
        <button id="post-btn">ด่ามัน →</button>
      </div>
    </section>

    <section class="feed" id="feed">
      <div class="feed-state">กำลังลอยข้อความขึ้นมา...</div>
    </section>
  </main>

  <p class="footer-note">พื้นที่นี้สร้างมาเพื่อด่า<br>ข้อความทั้งหมดที่นี่มองเห็นได้โดยทุกคน แต่ไม่มีใครรู้ว่าใครเป็นคนเขียน</p>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORAGE_KEY = 'posts-data';
  const feedEl = document.getElementById('feed');
  const composerInput = document.getElementById('composer-input');
  const postBtn = document.getElementById('post-btn');
  const charCount = document.getElementById('char-count');
  const toastEl = document.getElementById('toast');

  let posts = [];
  let loaded = false;
  const expandedComments = new Set();
  const litSession = new Set();

  // ---- ambient background lights ----
  function buildLights(){
    const container = document.getElementById('bg-lights');
    const n = 10;
    for(let i=0;i<n;i++){
      const dot = document.createElement('span');
      dot.className = 'light-dot';
      dot.style.left = (Math.random()*94 + 3) + '%';
      dot.style.top = (Math.random()*70 + 20) + '%';
      dot.style.animationDelay = (Math.random()*12) + 's';
      dot.style.animationDuration = (11 + Math.random()*8) + 's';
      container.appendChild(dot);
    }
  }
  buildLights();

  // ---- helpers ----
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function genId(){
    return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }

  function timeAgo(ts){
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'เมื่อสักครู่';
    if (diff < 3600) return Math.floor(diff/60) + ' นาทีที่แล้ว';
    if (diff < 86400) return Math.floor(diff/3600) + ' ชั่วโมงที่แล้ว';
    if (diff < 2592000) return Math.floor(diff/86400) + ' วันที่แล้ว';
    return new Date(ts).toLocaleDateString('th-TH');
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=> toastEl.classList.remove('show'), 2600);
  }

  // ---- storage ----
  async function loadPosts(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      return res ? JSON.parse(res.value) : [];
    }catch(e){
      return [];
    }
  }

  async function savePosts(arr){
    try{
      const res = await window.storage.set(STORAGE_KEY, JSON.stringify(arr), true);
      return !!res;
    }catch(e){
      console.error('save failed', e);
      return false;
    }
  }

  // ---- rendering ----
  function renderFeed(){
    if (!loaded){
      feedEl.innerHTML = '<div class="feed-state">กำลังลอยข้อความขึ้นมา...</div>';
      return;
    }
    if (posts.length === 0){
      feedEl.innerHTML = '<div class="feed-state">ยังไม่มีใครปล่อยอะไรลงน้ำเลย<br>เป็นคนแรกสิ</div>';
      return;
    }
    feedEl.innerHTML = posts.map(renderPost).join('');
  }

  function renderPost(p){
    const lit = litSession.has(p.id);
    const open = expandedComments.has(p.id);
    const commentCount = (p.comments || []).length;
    const commentsHtml = (p.comments || []).map(c => `
      <div class="comment-item">
        ${escapeHtml(c.text)}
        <span class="ts">${timeAgo(c.ts)}</span>
      </div>
    `).join('');

    return `
      <article class="post-card" data-id="${p.id}">
        <div class="post-top">
          <button class="candle-btn ${lit ? 'lit' : ''}" data-action="light" ${lit ? 'disabled' : ''}>
            <span class="candle-flame">🕯️</span>
            <span class="candle-count">${p.candles || 0}</span>
          </button>
          <span class="post-time">${timeAgo(p.ts)}</span>
        </div>
        <p class="post-text">${escapeHtml(p.text)}</p>
        <div class="post-footer">
          <button class="comment-toggle" data-action="toggle-comments">
            กำลังใจ${commentCount > 0 ? ' (' + commentCount + ')' : ''}
          </button>
        </div>
        <div class="comments ${open ? 'open' : ''}">
          <div class="comment-list">${commentsHtml}</div>
          <div class="comment-form">
            <input type="text" maxlength="300" placeholder="พิมพ์กำลังใจสั้นๆ...">
            <button data-action="send-comment">ส่ง</button>
          </div>
        </div>
      </article>
    `;
  }

  // ---- actions ----
  async function init(){
    posts = await loadPosts();
    loaded = true;
    renderFeed();
  }
  init();

  function updateCharCount(){
    const len = composerInput.value.length;
    charCount.textContent = len + '/1000';
    charCount.classList.toggle('near-limit', len > 900);
    postBtn.disabled = composerInput.value.trim().length === 0;
  }
  composerInput.addEventListener('input', () => {
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 320) + 'px';
    updateCharCount();
  });
  updateCharCount();

  postBtn.addEventListener('click', async () => {
    const text = composerInput.value.trim();
    if (!text) return;
    postBtn.disabled = true;
    postBtn.textContent = 'กำลังปล่อย...';
    try{
      const fresh = await loadPosts();
      const newPost = { id: genId(), text, ts: Date.now(), candles: 0, comments: [] };
      fresh.unshift(newPost);
      const ok = await savePosts(fresh);
      if (ok){
        posts = fresh;
        composerInput.value = '';
        composerInput.style.height = 'auto';
        updateCharCount();
        renderFeed();
      } else {
        showToast('ส่งไม่สำเร็จ ลองใหม่อีกครั้ง');
      }
    }catch(e){
      showToast('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง');
    }finally{
      postBtn.textContent = 'ด่ามัน →';
      updateCharCount();
    }
  });

  feedEl.addEventListener('click', async (e) => {
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const card = e.target.closest('.post-card');
    const postId = card.dataset.id;

    if (actionEl.dataset.action === 'light'){
      if (litSession.has(postId)) return;
      litSession.add(postId);
      actionEl.classList.add('lit');
      actionEl.disabled = true;
      try{
        const fresh = await loadPosts();
        const p = fresh.find(x => x.id === postId);
        if (p){
          p.candles = (p.candles || 0) + 1;
          await savePosts(fresh);
          posts = fresh;
          const countEl = actionEl.querySelector('.candle-count');
          if (countEl) countEl.textContent = p.candles;
        }
      }catch(err){
        litSession.delete(postId);
        actionEl.classList.remove('lit');
        actionEl.disabled = false;
      }
    }

    if (actionEl.dataset.action === 'toggle-comments'){
      if (expandedComments.has(postId)) expandedComments.delete(postId);
      else expandedComments.add(postId);
      const commentsBox = card.querySelector('.comments');
      commentsBox.classList.toggle('open');
    }

    if (actionEl.dataset.action === 'send-comment'){
      const input = card.querySelector('.comment-form input');
      const text = input.value.trim();
      if (!text) return;
      actionEl.disabled = true;
      try{
        const fresh = await loadPosts();
        const p = fresh.find(x => x.id === postId);
        if (p){
          if (!p.comments) p.comments = [];
          p.comments.push({ id: genId(), text, ts: Date.now() });
          const ok = await savePosts(fresh);
          if (ok){
            posts = fresh;
            expandedComments.add(postId);
            renderFeed();
          } else {
            showToast('ส่งกำลังใจไม่สำเร็จ ลองใหม่อีกครั้ง');
          }
        }
      }catch(err){
        showToast('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง');
      }finally{
        const stillThere = document.querySelector(`.post-card[data-id="${postId}"] [data-action="send-comment"]`);
        if (stillThere) stillThere.disabled = false;
      }
    }
  });

  feedEl.addEventListener('keydown', (e) => {
    if (e.target.matches('.comment-form input') && e.key === 'Enter'){
      e.preventDefault();
      const btn = e.target.parentElement.querySelector('[data-action="send-comment"]');
      if (btn) btn.click();
    }
  });

  document.querySelector('.feed-state')?.addEventListener('click', (e) => {
    if (e.target.tagName === 'BUTTON') init();
  });
})();
</script>

</body>
</html>
